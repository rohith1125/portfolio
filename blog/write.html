<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Write — Sai Rohith</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--bg2:#1c1c1e;--bg3:#2c2c2e;--bg4:#3a3a3c;
  --txt:#f5f5f7;--txt2:#a1a1a6;--accent:#0a84ff;--purple:#bf5af2;--green:#30d158;
  --grad:linear-gradient(135deg,#0a84ff,#bf5af2);
  --glass:rgba(28,28,30,0.72);
  --font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:var(--font);min-height:100vh;-webkit-font-smoothing:antialiased}

/* GATE */
#gate{position:fixed;inset:0;z-index:500;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1.4rem}
#gate h2{font-size:1.5rem;font-weight:600;letter-spacing:-0.02em}
#gate p{color:var(--txt2);font-size:0.92rem;text-align:center}
.gate-box{background:var(--bg2);border:1px solid rgba(255,255,255,0.08);border-radius:18px;padding:2.4rem 2.8rem;display:flex;flex-direction:column;gap:1.2rem;width:100%;max-width:380px;align-items:stretch}
.gate-box label{font-size:0.85rem;color:var(--txt2);font-weight:500;margin-bottom:0.2rem}
.gate-box input[type=password]{padding:0.75rem 1rem;background:var(--bg3);border:1px solid rgba(255,255,255,0.08);border-radius:10px;color:var(--txt);font-family:var(--font);font-size:0.95rem;outline:none;transition:border-color .2s}
.gate-box input[type=password]:focus{border-color:var(--accent)}
#gateError{color:#ff453a;font-size:0.82rem;min-height:1.1rem}
.btn-primary{padding:0.72rem 1.4rem;background:var(--accent);color:#fff;border:none;border-radius:10px;font-family:var(--font);font-size:0.92rem;font-weight:500;cursor:pointer;transition:opacity .2s;width:100%}
.btn-primary:hover{opacity:0.88}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 2rem;height:60px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,0.72);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.06)}
.nav-logo{font-size:1.05rem;font-weight:600;color:var(--txt);text-decoration:none;letter-spacing:-0.02em}
.nav-logo span{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-links{display:flex;gap:1.8rem;align-items:center}
.nav-links a{color:var(--txt2);text-decoration:none;font-size:0.9rem;font-weight:500;transition:color .2s}
.nav-links a:hover{color:var(--txt)}
.nav-links a.active{color:var(--accent)}
.nav-links a.btn-blog{background:var(--bg2);border:1px solid rgba(255,255,255,0.1);color:var(--txt2);padding:0.42rem 1.1rem;border-radius:20px;font-size:0.85rem;transition:all .2s}
.nav-links a.btn-blog:hover{color:var(--txt);border-color:rgba(255,255,255,0.2)}

/* EDITOR LAYOUT */
#editorApp{padding-top:60px;display:none;flex-direction:column;min-height:100vh}

.editor-header{padding:2rem 2rem 1.2rem;border-bottom:1px solid rgba(255,255,255,0.06)}
.editor-header h1{font-size:1.5rem;font-weight:700;letter-spacing:-0.03em}
.editor-header p{color:var(--txt2);font-size:0.88rem;margin-top:0.3rem}

/* META FIELDS */
.meta-bar{padding:1.4rem 2rem;background:var(--bg2);border-bottom:1px solid rgba(255,255,255,0.06);display:grid;grid-template-columns:1fr auto 1fr;gap:1.2rem;align-items:end}
@media(max-width:700px){.meta-bar{grid-template-columns:1fr}}
.field{display:flex;flex-direction:column;gap:0.4rem}
.field label{font-size:0.8rem;font-weight:500;color:var(--txt2);letter-spacing:0.03em;text-transform:uppercase}
.field input,.field select,.field textarea{padding:0.65rem 0.9rem;background:var(--bg3);border:1px solid rgba(255,255,255,0.07);border-radius:9px;color:var(--txt);font-family:var(--font);font-size:0.92rem;outline:none;transition:border-color .2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field select{cursor:pointer}
.field textarea{resize:vertical;min-height:68px;line-height:1.5}
.field select option{background:var(--bg3)}
.read-time-badge{padding:0.55rem 1rem;background:var(--bg3);border:1px solid rgba(255,255,255,0.07);border-radius:9px;font-size:0.88rem;color:var(--purple);font-weight:500;white-space:nowrap;text-align:center}

/* SPLIT PANE */
.split-pane{display:grid;grid-template-columns:1fr 1fr;flex:1;min-height:500px}
@media(max-width:700px){.split-pane{grid-template-columns:1fr}}
.pane-header{padding:0.7rem 1.2rem;background:var(--bg2);border-bottom:1px solid rgba(255,255,255,0.06);font-size:0.78rem;font-weight:600;color:var(--txt2);letter-spacing:0.05em;text-transform:uppercase;display:flex;align-items:center;gap:0.5rem}
.pane-left{border-right:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column}
.pane-right{display:flex;flex-direction:column}
#mdEditor{flex:1;padding:1.4rem 1.6rem;background:var(--bg);color:var(--txt);font-family:var(--mono);font-size:0.9rem;line-height:1.75;border:none;outline:none;resize:none;min-height:420px}
#mdEditor::placeholder{color:var(--bg4)}
#preview{flex:1;padding:1.4rem 1.8rem;overflow-y:auto;line-height:1.8}
#preview h1{font-size:1.6rem;font-weight:700;margin-bottom:1.2rem;letter-spacing:-0.03em;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#preview h2{font-size:1.15rem;font-weight:600;margin:1.8rem 0 0.7rem;color:var(--txt);border-bottom:1px solid rgba(255,255,255,0.06);padding-bottom:0.4rem}
#preview p{margin-bottom:1rem;color:#ddd;font-size:0.93rem}
#preview strong{color:var(--txt);font-weight:600}
#preview code{font-family:var(--mono);font-size:0.86em;background:var(--bg3);padding:0.15em 0.4em;border-radius:4px;color:var(--purple)}
#preview pre{background:var(--bg2);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:1rem 1.2rem;margin:1rem 0;overflow-x:auto}
#preview pre code{background:none;padding:0;color:var(--green);font-size:0.85rem}
#preview ul,#preview ol{margin:0.3rem 0 1rem 1.5rem}
#preview li{margin-bottom:0.35rem;color:#ddd;font-size:0.93rem}
.empty-preview{color:var(--bg4);font-size:0.9rem;padding-top:1rem}

/* ACTION BAR */
.action-bar{padding:1rem 2rem;background:var(--bg2);border-top:1px solid rgba(255,255,255,0.06);display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.btn-secondary{padding:0.6rem 1.4rem;background:transparent;border:1px solid rgba(255,255,255,0.12);color:var(--txt2);font-family:var(--font);font-size:0.88rem;font-weight:500;border-radius:10px;cursor:pointer;transition:all .2s}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-success{padding:0.6rem 1.6rem;background:var(--green);color:#000;border:none;font-family:var(--font);font-size:0.88rem;font-weight:600;border-radius:10px;cursor:pointer;transition:opacity .2s}
.btn-success:hover{opacity:0.85}
#saveMsg{font-size:0.82rem;color:var(--green);margin-left:auto}

/* LISTS SECTION */
.lists-section{padding:2rem;display:grid;grid-template-columns:1fr 1fr;gap:2rem;border-top:1px solid rgba(255,255,255,0.06)}
@media(max-width:700px){.lists-section{grid-template-columns:1fr}}
.list-panel h3{font-size:1rem;font-weight:600;margin-bottom:1.2rem;color:var(--txt2)}
.post-item{background:var(--bg2);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:1rem 1.1rem;display:flex;align-items:flex-start;gap:0.8rem;margin-bottom:0.7rem}
.post-item-info{flex:1;min-width:0}
.post-item-info strong{font-size:0.9rem;font-weight:600;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.post-item-info span{font-size:0.78rem;color:var(--txt2)}
.post-item-actions{display:flex;gap:0.5rem;flex-shrink:0}
.btn-xs{padding:0.3rem 0.75rem;font-size:0.78rem;font-weight:500;border-radius:7px;cursor:pointer;border:1px solid rgba(255,255,255,0.1);background:transparent;font-family:var(--font);transition:all .2s}
.btn-xs.load{color:var(--accent);border-color:rgba(10,132,255,0.3)}
.btn-xs.load:hover{background:rgba(10,132,255,0.12)}
.btn-xs.del{color:#ff453a;border-color:rgba(255,69,58,0.3)}
.btn-xs.del:hover{background:rgba(255,69,58,0.12)}
.empty-list{color:var(--txt2);font-size:0.85rem;font-style:italic}

.theme-btn{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#86868b;display:flex;align-items:center;justify-content:center;font-size:.85rem;cursor:pointer;transition:all .2s;flex-shrink:0;}
.theme-btn:hover{background:rgba(255,255,255,.12);}
html.light{--bg0:#f5f5f7;--bg1:#e8e8ed;--bg2:#d8d8df;--t1:#1d1d1f;--t2:#6e6e73;--border:rgba(0,0,0,0.1);}
html.light body{background:var(--bg0);color:var(--t1);}
html.light nav{background:rgba(245,245,247,0.82);border-bottom-color:rgba(0,0,0,.1);}
html.light .nav-logo{color:var(--t1);}
html.light .nav-back{color:var(--t2);}
html.light .theme-btn{background:rgba(0,0,0,.06);border-color:rgba(0,0,0,.1);}
html.light .gate-box{background:rgba(255,255,255,.9);border-color:rgba(0,0,0,.1);}
html.light .gate-box h2{color:var(--t1);}
html.light .gate-input{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.12);color:var(--t1);}
html.light .gate-btn{background:var(--blue);}
html.light .editor-main{border-right-color:rgba(0,0,0,.1);}
html.light .input-title{color:var(--t1);}
html.light .input-excerpt{color:var(--t2);}
html.light .select-cat{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.12);color:var(--t1);}
html.light .input-tags{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.12);color:var(--t1);}
html.light .toolbar-btn{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.1);color:var(--t2);}
html.light .toolbar-btn:hover{color:var(--t1);border-color:rgba(0,0,0,.2);}
html.light .toolbar-btn.active{color:var(--blue);border-color:rgba(10,132,255,.3);background:rgba(10,132,255,.08);}
html.light #content-area{color:#3a3a3c;}
html.light #preview-area{color:#3a3a3c;}
html.light #preview-area h2,html.light #preview-area h3{color:var(--t1);}
html.light #preview-area code{background:rgba(0,0,0,.06);border-color:rgba(0,0,0,.1);color:#1d1d1f;}
html.light #preview-area pre{background:#e0e0e8;border-color:rgba(0,0,0,.1);}
html.light .editor-actions{border-top-color:rgba(0,0,0,.08);}
html.light .btn-draft{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.12);color:var(--t2);}
html.light .btn-draft:hover{color:var(--t1);}
html.light .sidebar{background:var(--bg0);border-left-color:rgba(0,0,0,.1);}
html.light .sidebar-section-title{color:var(--t3,#8e8e93);}
html.light .draft-item{background:rgba(255,255,255,.9);border-color:rgba(0,0,0,.1);}
html.light .draft-title{color:var(--t1);}
html.light .draft-date{color:var(--t2);}
html.light .slug-preview{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.1);color:var(--t2);}
html.light .editor-stats{color:var(--t2);}
html.light .autosave-label{color:var(--t2);}
html.light .input-title::placeholder,html.light .input-excerpt::placeholder,html.light #content-area::placeholder{color:rgba(0,0,0,.2);}

/* Footer */
footer{padding:2rem;border-top:1px solid rgba(255,255,255,0.06);text-align:center}
footer a{color:var(--accent);font-size:0.88rem;text-decoration:none}
</style>
</head>
<body>

<!-- PASSWORD GATE -->
<div id="gate">
  <div class="gate-box">
    <div>
      <h2 style="font-size:1.3rem;font-weight:700;margin-bottom:0.4rem">Admin Access</h2>
      <p style="color:var(--txt2);font-size:0.85rem">Enter password to access the blog editor</p>
    </div>
    <div class="field">
      <label for="pwInput">Password</label>
      <input type="password" id="pwInput" placeholder="Enter password" autocomplete="current-password"/>
    </div>
    <div id="gateError"></div>
    <button class="btn-primary" id="pwSubmit">Unlock Editor</button>
  </div>
</div>

<!-- MAIN APP (hidden until auth) -->
<div id="editorApp">
  <nav>
    <a class="nav-logo" href="../index.html"><span>Sai Rohith</span></a>
    <div class="nav-links">
      <a href="write.html" class="active">Write</a>
      <a href="index.html" class="btn-blog">View Blog</a>
    </div>
    <button class="theme-btn" id="theme-btn" aria-label="Toggle theme">🌙</button>
  </nav>

  <div class="editor-header">
    <h1>Blog Editor</h1>
    <p>Write, preview, and publish articles to your blog.</p>
  </div>

  <div class="meta-bar">
    <div class="field">
      <label>Title</label>
      <input type="text" id="fTitle" placeholder="Article title…"/>
    </div>
    <div class="field">
      <label>Category</label>
      <select id="fCat">
        <option value="AI/ML">AI/ML</option>
        <option value="Systems">Systems</option>
        <option value="Engineering">Engineering</option>
        <option value="Career">Career</option>
      </select>
    </div>
    <div class="field">
      <label>Excerpt</label>
      <textarea id="fExcerpt" placeholder="One-line description for the card…" rows="2"></textarea>
    </div>
  </div>
  <div style="padding:0.6rem 2rem;background:var(--bg2);border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:0.8rem">
    <span style="font-size:0.78rem;color:var(--txt2);text-transform:uppercase;font-weight:600;letter-spacing:0.04em">Estimated read time:</span>
    <span id="rtDisplay" class="read-time-badge">0 min</span>
  </div>

  <div class="split-pane">
    <div class="pane-left">
      <div class="pane-header">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
        Markdown
      </div>
      <textarea id="mdEditor" placeholder="# Your article title&#10;&#10;## Introduction&#10;&#10;Start writing in Markdown…&#10;&#10;**Bold text** and `inline code` are supported.&#10;&#10;## Section&#10;&#10;Your content here."></textarea>
    </div>
    <div class="pane-right">
      <div class="pane-header">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        Preview
      </div>
      <div id="preview"><p class="empty-preview">Preview will appear here…</p></div>
    </div>
  </div>

  <div class="action-bar">
    <button class="btn-secondary" id="saveDraftBtn">Save Draft</button>
    <button class="btn-primary" id="publishBtn" style="width:auto;padding:0.6rem 1.6rem">Publish Post</button>
    <button class="btn-secondary" id="clearBtn">Clear</button>
    <span id="saveMsg"></span>
  </div>

  <div class="lists-section">
    <div class="list-panel">
      <h3>Saved Drafts</h3>
      <div id="draftsList"></div>
    </div>
    <div class="list-panel">
      <h3>Published Posts</h3>
      <div id="publishedList"></div>
    </div>
  </div>

  <footer>
    <a href="index.html">← View Blog</a>
  </footer>
</div>

<script>
// --- AUTH ---
const CORRECT_PW = 'srt2025';
const gate = document.getElementById('gate');
const pwInput = document.getElementById('pwInput');
const gateError = document.getElementById('gateError');
const editorApp = document.getElementById('editorApp');

function unlock() {
  if (pwInput.value === CORRECT_PW) {
    gate.style.display = 'none';
    editorApp.style.display = 'flex';
    renderLists();
  } else {
    gateError.textContent = 'Incorrect password. Please try again.';
    pwInput.value = '';
    pwInput.focus();
  }
}

document.getElementById('pwSubmit').addEventListener('click', unlock);
pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });

// --- MARKDOWN PARSER ---
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function inlineFormat(s) {
  s = s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  s = s.replace(/`([^`]+)`/g,'<code>$1</code>');
  return s;
}
function parseMarkdown(md) {
  const lines = md.split('\n');
  let html = '';
  let inPre = false, inUl = false, preBuffer = '';
  for (let i = 0; i < lines.length; i++) {
    let line = lines[i];
    if (line.startsWith('```')) {
      if (!inPre) { inPre = true; preBuffer = ''; }
      else { html += `<pre><code>${escHtml(preBuffer.trimEnd())}</code></pre>`; inPre = false; preBuffer = ''; }
      continue;
    }
    if (inPre) { preBuffer += line + '\n'; continue; }
    if (inUl && !line.startsWith('- ') && !line.startsWith('* ')) { html += '</ul>'; inUl = false; }
    if (line.startsWith('# ')) {
      html += `<h1>${inlineFormat(line.slice(2))}</h1>`;
    } else if (line.startsWith('## ')) {
      html += `<h2>${inlineFormat(line.slice(3))}</h2>`;
    } else if (line.startsWith('- ') || line.startsWith('* ')) {
      if (!inUl) { html += '<ul>'; inUl = true; }
      html += `<li>${inlineFormat(line.slice(2))}</li>`;
    } else if (line.trim() === '') {
      // skip
    } else {
      html += `<p>${inlineFormat(line)}</p>`;
    }
  }
  if (inUl) html += '</ul>';
  if (inPre) html += `<pre><code>${escHtml(preBuffer)}</code></pre>`;
  return html || '<p class="empty-preview">Preview will appear here…</p>';
}

// --- READ TIME ---
function calcReadTime(text) {
  const words = text.trim().split(/\s+/).filter(Boolean).length;
  return Math.max(1, Math.round(words / 200));
}

// --- LIVE PREVIEW ---
const mdEditor = document.getElementById('mdEditor');
const preview = document.getElementById('preview');
const rtDisplay = document.getElementById('rtDisplay');

mdEditor.addEventListener('input', () => {
  const val = mdEditor.value;
  preview.innerHTML = parseMarkdown(val);
  const rt = calcReadTime(val);
  rtDisplay.textContent = `${rt} min`;
});

// --- STORAGE HELPERS ---
function getDrafts() { try { return JSON.parse(localStorage.getItem('blog_drafts') || '[]'); } catch { return []; } }
function saveDrafts(d) { localStorage.setItem('blog_drafts', JSON.stringify(d)); }
function getPublished() { try { return JSON.parse(localStorage.getItem('published_posts') || '[]'); } catch { return []; } }
function savePublished(p) { localStorage.setItem('published_posts', JSON.stringify(p)); }

function slugify(s) {
  return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'') + '-' + Date.now();
}

function saveMsg(msg, color) {
  const el = document.getElementById('saveMsg');
  el.textContent = msg;
  el.style.color = color || 'var(--green)';
  setTimeout(() => { el.textContent = ''; }, 3000);
}

// --- SAVE DRAFT ---
document.getElementById('saveDraftBtn').addEventListener('click', () => {
  const title = document.getElementById('fTitle').value.trim();
  const content = mdEditor.value.trim();
  if (!title && !content) { saveMsg('Nothing to save.', 'var(--txt2)'); return; }
  const drafts = getDrafts();
  const draft = {
    id: 'draft-' + Date.now(),
    title: title || 'Untitled',
    cat: document.getElementById('fCat').value,
    excerpt: document.getElementById('fExcerpt').value.trim(),
    content,
    savedAt: new Date().toISOString()
  };
  drafts.unshift(draft);
  saveDrafts(drafts);
  saveMsg('Draft saved!');
  renderLists();
});

// --- PUBLISH ---
document.getElementById('publishBtn').addEventListener('click', () => {
  const title = document.getElementById('fTitle').value.trim();
  const content = mdEditor.value.trim();
  const excerpt = document.getElementById('fExcerpt').value.trim();
  if (!title) { saveMsg('Title is required to publish.', '#ff453a'); return; }
  if (!content) { saveMsg('Content cannot be empty.', '#ff453a'); return; }
  const published = getPublished();
  const post = {
    id: slugify(title),
    title,
    cat: document.getElementById('fCat').value,
    excerpt: excerpt || title,
    content,
    date: new Date().toISOString().split('T')[0],
    readTime: calcReadTime(content),
    publishedAt: new Date().toISOString()
  };
  published.unshift(post);
  savePublished(published);
  saveMsg('Published! Visible on blog.', 'var(--green)');
  renderLists();
});

// --- CLEAR ---
document.getElementById('clearBtn').addEventListener('click', () => {
  document.getElementById('fTitle').value = '';
  document.getElementById('fExcerpt').value = '';
  mdEditor.value = '';
  preview.innerHTML = '<p class="empty-preview">Preview will appear here…</p>';
  rtDisplay.textContent = '0 min';
});

// --- LOAD DRAFT INTO EDITOR ---
function loadDraft(draft) {
  document.getElementById('fTitle').value = draft.title;
  document.getElementById('fCat').value = draft.cat;
  document.getElementById('fExcerpt').value = draft.excerpt || '';
  mdEditor.value = draft.content || '';
  preview.innerHTML = parseMarkdown(draft.content || '');
  rtDisplay.textContent = calcReadTime(draft.content || '') + ' min';
  window.scrollTo(0, 0);
  saveMsg('Draft loaded into editor.');
}

// --- RENDER LISTS ---
function renderLists() {
  // Drafts
  const drafts = getDrafts();
  const dl = document.getElementById('draftsList');
  if (drafts.length === 0) {
    dl.innerHTML = '<p class="empty-list">No saved drafts yet.</p>';
  } else {
    dl.innerHTML = drafts.map((d, i) => `
      <div class="post-item">
        <div class="post-item-info">
          <strong>${escHtmlStr(d.title)}</strong>
          <span>${new Date(d.savedAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span>
        </div>
        <div class="post-item-actions">
          <button class="btn-xs load" onclick="loadDraft(getDraftByIdx(${i}))">Load</button>
          <button class="btn-xs del" onclick="deleteDraft(${i})">Delete</button>
        </div>
      </div>
    `).join('');
  }

  // Published
  const published = getPublished();
  const pl = document.getElementById('publishedList');
  if (published.length === 0) {
    pl.innerHTML = '<p class="empty-list">No published posts yet.</p>';
  } else {
    pl.innerHTML = published.map((p, i) => `
      <div class="post-item">
        <div class="post-item-info">
          <strong>${escHtmlStr(p.title)}</strong>
          <span>${p.cat} · ${p.readTime} min read · ${new Date(p.publishedAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span>
        </div>
        <div class="post-item-actions">
          <a href="post.html?id=${p.id}" class="btn-xs load" target="_blank" style="text-decoration:none">View</a>
          <button class="btn-xs del" onclick="deletePublished(${i})">Delete</button>
        </div>
      </div>
    `).join('');
  }
}

function escHtmlStr(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function getDraftByIdx(i) { return getDrafts()[i]; }

function deleteDraft(i) {
  const drafts = getDrafts();
  drafts.splice(i, 1);
  saveDrafts(drafts);
  renderLists();
  saveMsg('Draft deleted.', 'var(--txt2)');
}

function deletePublished(i) {
  const p = getPublished();
  const title = p[i].title;
  p.splice(i, 1);
  savePublished(p);
  renderLists();
  saveMsg(`"${title}" deleted.`, 'var(--txt2)');
}
// theme toggle
(function(){
  const btn=document.getElementById('theme-btn');
  if(!btn)return;
  const stored=localStorage.getItem('srt_theme');
  if(stored==='light'){document.documentElement.classList.add('light');btn.textContent='☀️';}
  btn.addEventListener('click',()=>{
    const isLight=document.documentElement.classList.toggle('light');
    btn.textContent=isLight?'☀️':'🌙';
    localStorage.setItem('srt_theme',isLight?'light':'dark');
  });
})();
</script>
