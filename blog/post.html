    content: `# Building Production RAG: Lessons from CHIE-AC

## The Problem Nobody Warns You About

When I built CHIE-AC — a healthcare document question-answering system — I assumed the hard part would be choosing the right LLM. I was wrong. The hard part was everything that happens before the model even sees your query.

RAG sounds deceptively simple: chunk your documents, embed them, store in a vector DB, retrieve at query time, feed to LLM. In practice, every one of those steps is a landmine. Here's what I learned the painful way.

## Chunking Is Not Trivial

My first instinct was fixed-size chunking at 512 tokens with 50-token overlaps. Clean, simple, wrong. Healthcare documents have dense semantic structure — a discharge summary has medication lists, diagnoses, follow-up instructions, and narrative prose all interleaved. Fixed chunking shredded context across boundaries constantly.

The fix: hierarchical chunking. I split first at the document section level (using regex to detect headers), then chunk within sections. Overlap windows were tuned per section type — narrative prose got 20% overlap, structured lists got near zero. Retrieval precision improved by 34% measured against a ground-truth eval set I built by hand.

## Why Your Embeddings Lie to You

Cosine similarity in embedding space does not equal semantic relevance. It equals proximity in the training distribution of your embedding model. For out-of-domain text — medical jargon, abbreviations, internal acronyms — the model has seen similar surface-level patterns but assigns misleading similarity scores.

I caught this when queries about "CABG" (coronary artery bypass graft) were retrieving chunks about "graft rejection" in transplant contexts. The embedding model had no concept that clinical shorthand mapped to a specific procedure. The fix was a hybrid retrieval approach: BM25 sparse retrieval for keyword precision combined with dense vector retrieval, with Reciprocal Rank Fusion to merge result sets.

## Reranking Changes Everything

The biggest performance jump came from adding a cross-encoder reranker as a second retrieval stage. Initial retrieval pulls top-20 candidates using BM25 + vector hybrid. The reranker (a fine-tuned BERT variant) then scores each chunk against the full query, returning top-5. This is computationally heavier, but the latency hit is acceptable at roughly 80ms for a 20-chunk rerank operation.

Reranking reduced hallucination rate from 12% to under 3% on my eval set, measured by checking whether cited document passages actually supported model answers.

## Context Window Packing

With a 4K context window (GPT-3.5 era constraints), fitting retrieved chunks plus system prompt plus answer headroom required careful token budgeting. I implemented a greedy packing algorithm: insert chunks in descending rerank score order until budget is hit, with mandatory insertion of the top-1 chunk regardless of budget pressure.

## What I'd Do Differently

Start with eval before building. I wasted weeks tuning systems without objective metrics. Build a 50–100 example evaluation set on day one. Measure chunking quality, retrieval recall, and answer faithfulness separately — they fail independently and require different fixes.

RAG is not a feature; it's a pipeline. Every joint is a failure mode. Treat it accordingly.`

    content: `# Writing Autograd from Scratch in Python

## Why Build What Already Exists?

PyTorch exists. TensorFlow exists. JAX exists. So why spend three weeks building NewTorch, a NumPy-only autograd framework? Because you don't truly understand automatic differentiation until you've implemented it, watched it produce NaN gradients, and traced back through six layers of your own abstraction to find the bug.

This is the story of that process.

## The Core Idea: Computation Graphs

Everything in autograd hinges on one concept: the computation graph. Every operation you perform — addition, multiplication, matrix multiply, activation functions — creates a node in a directed acyclic graph. Leaf nodes are your inputs and parameters. Each non-leaf node knows its operation and its input nodes.

In NewTorch, every value is a \`Tensor\` object. Each Tensor stores a NumPy array for forward values, a NumPy array for accumulated gradients, and a list of (parent_tensor, local_gradient_fn) tuples.

\`\`\`
class Tensor:
    def __init__(self, data, _children=()):
        self.data = np.array(data, dtype=np.float64)
        self.grad = np.zeros_like(self.data)
        self._backward = lambda: None
        self._prev = set(_children)
\`\`\`

## Forward Pass: Just Math

The forward pass is straightforward. When you write \`c = a * b\`, NewTorch creates a new Tensor whose data is \`a.data * b.data\`, and records that \`c\` came from \`a\` and \`b\` via multiplication. No magic yet.

## Backward Pass: Chain Rule in Code

The magic is in \`backward()\`. Starting from the output node (loss), we perform a topological sort of the graph to visit nodes in reverse dependency order. Then we walk backward, calling each node's \`_backward\` function to propagate gradients.

For multiplication \`c = a * b\`, the local gradients are: \`∂c/∂a = b\` and \`∂c/∂b = a\`. Each node accumulates incoming gradients from all downstream nodes before computing its own backward pass — this is the "+=" accumulation pattern that handles nodes with multiple consumers.

## The Bug That Cost Me Four Hours

I implemented matrix multiplication and tested it on a tiny 2-layer network. The gradients looked plausible. Then I scaled to deeper networks and gradients exploded on odd-shaped weight matrices.

The bug: I was transposing the wrong dimension during backward. For \`C = A @ B\`, the gradient w.r.t. \`A\` is \`grad_C @ B.T\` and w.r.t. \`B\` is \`A.T @ grad_C\`. I had the transpose axes wrong for batched operations, causing shape mismatches that NumPy was silently broadcasting into nonsense.

Lesson: test gradients numerically. For every operation, I now verify against finite-difference approximation: \`(f(x+ε) - f(x-ε)) / 2ε\`. If your analytic gradient doesn't match within 1e-5, your backward is wrong.

## Results

NewTorch trains MNIST to 97.4% accuracy using a 3-layer MLP, matching PyTorch on equivalent architecture. Training is ~40x slower due to Python loop overhead versus PyTorch's C++ kernels — but correctness is the point, not speed.

The code is ~600 lines. Reading it is the best autograd tutorial I know.`

    content: `# Production ML at Scale: Census Classification Lessons

## The Reality Gap

Academic ML teaches you to optimize F1 scores on clean, static datasets. Production ML at a global bank teaches you that your dataset is never clean, never static, and the humans who labeled it had different instructions depending on the quarter. The Census Bureau Occupation Classification project was my introduction to this reality.

## The Problem

The task: classify free-text occupation descriptions into standardized SOC (Standard Occupational Classification) codes. Simple enough in theory. In practice: 800,000 training examples with 12% inconsistent labels, 583 output classes with severe long-tail distribution, and a requirement to match or exceed human annotator agreement rates of 78%.

## Dual-Branch Architecture

Single-model approaches hit a ceiling around 72% accuracy. The breakthrough was a dual-branch architecture. Branch A used TF-IDF features with a gradient boosted classifier — excellent at surface-level pattern matching for common occupations where exact phrase matching dominates. Branch B used sentence embeddings (fine-tuned on occupational text) with a neural classifier — better at semantic generalization for rare or ambiguous descriptions.

The branches were fused via a learned confidence-weighted ensemble. For each input, we computed each branch's softmax entropy as an uncertainty signal. When Branch A is highly confident (low entropy), its output dominates. When both branches are uncertain, we fall back to a rule-based system for the top 50 most common occupations.

Final accuracy: 84.3% — 6.3 points above the human baseline.

## Data Quality Was the Real Problem

Forty percent of engineering time went to data quality, not modeling. Key issues we found:

**Label drift**: Annotators in 2019 used updated SOC 2018 codes; records from 2015 used SOC 2010. The mapping tables between versions had 200+ changes including splits, merges, and reclassifications. Training a single model on mixed-vintage data introduced systematic errors.

**Class imbalance at the tail**: The 50 most common codes had 95% of training examples. The bottom 300 codes had fewer than 50 examples each. Standard cross-entropy loss was useless here. Focal loss with per-class weighting improved tail accuracy by 18%.

**Description quality variance**: Descriptions ranged from precise ("Senior software engineer, cloud infrastructure") to nearly useless ("works"). We trained a description quality scorer and routed low-quality inputs to a confidence-boosting pipeline that queried similar high-quality examples.

## Monitoring in Production

A model that performs well at deploy time can silently degrade. We instrumented three signals: prediction confidence distribution (drift means inputs are changing), per-class prediction rate (sudden spikes indicate labeling issues upstream), and monthly manual audit sample reviewed by domain experts.

The most important production lesson: build your monitoring before you deploy. You cannot instrument a black box after the fact without significant rework.`

    content: `# Real-Time Voice AI: Building HarmonySpeak

## What Is Speaker Diarization?

Diarization answers the question: "who spoke when?" Given an audio stream with multiple people talking, segment it into speaker-labeled intervals. It sounds like a solved problem until you try to do it in real-time over WebRTC with consumer microphones in noisy environments.

HarmonySpeak was my attempt at a practical real-time diarization system. Here's what I learned about audio ML the hard way.

## The Audio Pipeline

Raw audio from the browser arrives as 16-bit PCM at 16kHz via WebRTC. Before any ML touches it, the signal needs preprocessing: noise gating to drop silence, normalization to handle mic level variance across users, and a pre-emphasis filter (high-pass) to boost high-frequency speech formants that carry speaker identity.

Feature extraction converts audio frames into MFCC (Mel-Frequency Cepstral Coefficients) vectors. Each 25ms frame with 10ms hop produces a 40-dimensional vector. MFCCs are the right choice over raw spectrograms for speaker identity — they're compact, computationally cheap, and encode the spectral envelope that captures vocal tract characteristics.

## The Buffering Problem

This is where real-time systems get painful. Diarization requires context — you need multiple consecutive utterance segments to confidently assign a speaker identity. But users expect low latency. These goals are in direct tension.

My solution was a dual-buffer architecture. A short buffer (200ms) runs a lightweight voice activity detection (VAD) model to detect speech/silence transitions. When a speech segment is detected, it's enqueued in a processing buffer. The diarization model operates on the processing buffer in a background thread, updating speaker labels asynchronously. The UI receives speaker label updates with roughly 400ms latency — imperceptible in conversation flow.

## Speaker Enrollment and Online Clustering

The system operates in two modes. Enrolled mode: known speakers have been pre-registered with 3–5 seconds of reference audio. Speaker embedding distance to enrolled profiles determines identity. Unknown mode: online clustering groups utterances by similarity, assigning anonymous labels (Speaker 1, Speaker 2) that resolve to identities when enrollment happens later.

Online clustering used an agglomerative approach with cosine distance on d-vector speaker embeddings. The cluster linkage threshold was the most sensitive hyperparameter — too tight and one speaker gets split into multiple identities; too loose and multiple speakers merge into one. I ended up at 0.68 cosine distance, tuned on a held-out dataset of 2–4 person conversations.

## Latency Budget

End-to-end latency breakdown at target performance:
- Audio capture + WebRTC: ~20ms
- Preprocessing + MFCC: ~8ms
- VAD inference: ~12ms
- Diarization (async): ~180ms
- Total perceived latency: ~40ms (VAD path), ~400ms (full diarization labels)

The key insight: separate latency-sensitive paths (speech detection) from latency-tolerant paths (speaker identity). Users tolerate a short pause before seeing speaker labels; they do not tolerate choppy audio caused by blocking the audio thread.

## What I'd Build Differently

WebRTC noise suppression interferes with MFCC-based speaker recognition in ways I didn't anticipate — it partially normalizes the spectral characteristics that encode speaker identity. I'd run speaker recognition on the raw stream before suppression, piping suppressed audio only to the user-facing output.`

    content: `# On Becoming an AI Engineer in 2024

## The Title Didn't Exist Three Years Ago

"AI Engineer" wasn't a job category when I started studying computer science. The field crystallized fast — partly hype, partly genuine demand for people who could bridge the gap between ML research and production systems. I ended up in that gap, which turned out to be a good place to be.

Here's what I've learned about what the role actually requires, versus what job postings say it requires.

## What Matters (From Experience)

**Systems thinking, not prompt engineering.** The engineers I've seen excel at this work think in pipelines and failure modes, not in clever prompts. Prompt engineering is a useful tactic; systems thinking is a durable skill. When something goes wrong in a production ML system — and it will — the ability to reason about which component failed and why is worth more than the ability to craft a perfect system prompt.

**Software engineering fundamentals are non-negotiable.** I've interviewed at companies where "AI Engineer" roles were filled by people who couldn't write clean, testable code. They hit walls immediately when asked to productionize anything. The ML part is learnable. The software engineering discipline is harder to develop quickly.

**Statistical intuition over framework fluency.** Knowing why a model is failing requires understanding distributions, variance, and bias in a deep way. Knowing how to call \`model.fit()\` is table stakes. I've found that time spent with probability theory and linear algebra pays compound returns — it makes everything else legible.

## What Surprised Me

The problems are mostly data problems. I expected to spend my time tuning models. Instead, I spent most of my time on data collection, cleaning, and labeling pipelines. The model is often the easy part. Getting high-quality, representative, consistently-labeled training data is the hard part, and it's underrepresented in most educational programs.

Evaluation is undervalued and underbuilt. Most teams I've worked with or observed have much weaker evaluation infrastructure than they think they need. Without rigorous evals, you can't tell if a model change is an improvement or regression. Building eval sets is unglamorous work that pays off enormously.

## Skills I'd Prioritize

For anyone starting this path now: learn to build things end-to-end before specializing. Build a full RAG pipeline. Fine-tune a small model. Write a training loop from scratch. Build a serving API with proper logging and monitoring. The breadth matters early — it gives you the vocabulary to understand which specialization you actually want.

The field rewards people who can ship, not just people who can explain how transformers work. Both matter, but shipping is rarer.`

// Simple markdown parser
function parseMarkdown(md) {
  const lines = md.split('\n');
  let html = '';
  let inPre = false;
  let inUl = false;
  let preBuffer = '';

  for (let i = 0; i < lines.length; i++) {
    let line = lines[i];

    // Code block
    if (line.startsWith('```')) {
      if (!inPre) {
        inPre = true;
        preBuffer = '';
      } else {
        html += `<pre><code>${escHtml(preBuffer.trimEnd())}</code></pre>`;
        inPre = false;
        preBuffer = '';
      }
      continue;
    }
    if (inPre) { preBuffer += line + '\n'; continue; }

    // Close list if needed
    if (inUl && !line.startsWith('- ') && !line.startsWith('* ')) {
      html += '</ul>';
      inUl = false;
    }

    if (line.startsWith('# ')) {
      // h1 — skip, used as title
      continue;
    } else if (line.startsWith('## ')) {
      html += `<h2>${inlineFormat(line.slice(3))}</h2>`;
    } else if (line.startsWith('- ') || line.startsWith('* ')) {
      if (!inUl) { html += '<ul>'; inUl = true; }
      html += `<li>${inlineFormat(line.slice(2))}</li>`;
    } else if (line.trim() === '') {
      // skip empty
    } else {
      html += `<p>${inlineFormat(line)}</p>`;
    }
  }
  if (inUl) html += '</ul>';
  return html;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function inlineFormat(s) {
  // bold
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // inline code
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  return s;
}

      <div class="post-meta">
        <span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          ${formatDate(post.date)}
        </span>
        <div class="divider"></div>
        <span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          ${post.readTime} min read
        </span>
      </div>
    </header>
    <article class="article-body">${parseMarkdown(post.content)}</article>
    <div class="share-section">
      <div>
        <strong>Found this useful?</strong>
        <p>Share it with someone who'd appreciate it.</p>
      </div>
      <button id="copyBtn">Copy link</button>
    </div>
    <div class="related-section">
      <h3>More articles</h3>
      <div class="related-grid">
        ${related.map(r => `
          <a class="related-card" href="post.html?id=${r.id}">
            <span class="r-badge ${badgeClass(r.cat)}" style="color:${r.cat==='AI/ML'?'var(--purple)':r.cat==='Systems'?'var(--green)':r.cat==='Career'?'#ff9f0a':'var(--accent)'}">${r.cat}</span>
            <h4>${r.title}</h4>
            <span>${r.readTime} min read</span>
          </a>
        `).join('')}
      </div>
    </div>
  `;

  document.getElementById('copyBtn').addEventListener('click', function() {
    navigator.clipboard.writeText(window.location.href).then(() => {
      this.textContent = 'Copied!';
      this.classList.add('copied');
      setTimeout(() => { this.textContent = 'Copy link'; this.classList.remove('copied'); }, 2000);
    });
  });
}
</script>
</body>
</html>
